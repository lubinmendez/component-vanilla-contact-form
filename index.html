<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/shared-variables.css">
  <link rel="stylesheet" href="./styles/base-styles.css">
  <link rel="stylesheet" href="./components/contact-form/contact-form.css">
  <title>Component vanilla molde</title>
</head>
<body>

  <div class="contact-form-wrapper"> <!-- Only used to center the form. Remove this wrapper and its CSS if you don't need it centered. -->

    <!-- If you don't want to use Formspree for email submissions, remove the action and method attributes -->
    <form class="contact-form" action="https://formspree.io/f/xojzyvzw" method="POST">
      <input type="text" placeholder="Full name" name="fullName" aria-label="Full name" autocomplete="name" required />

      <input type="email" placeholder="Email address" name="email" aria-label="Email address" autocomplete="email" required />

      <textarea placeholder="Write your message..." name="message" rows="6" aria-label="Write your message" required></textarea>

      <button class="contact-form-btn" type="submit">Send message</button>
    </form>

  </div>


</body>
</html>
