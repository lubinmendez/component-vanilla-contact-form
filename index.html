<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./styles/global-variables.css">
  <link rel="stylesheet" href="./styles/global-styles.css">
  <link rel="stylesheet" href="./components/contact-form/contact-form.css">
  <title>Component vanilla molde</title>
</head>
<body>

  <form class="contact-form">
    <input type="text" placeholder="Full name" name="fullName" aria-label="Full name" required />

    <input type="email" placeholder="Email address" name="email" aria-label="Email address" required />

    <textarea placeholder="Write your message..." name="message" rows="6" aria-label="Write your message" required></textarea>

    <button class="contact-form-btn" type="submit">Send message</button>
  </form>


</body>
</html>
